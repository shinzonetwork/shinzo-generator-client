networks:
  shinzo-net:
    driver: bridge

services:
  indexer:
    container_name: shinzo-generator
    platform: linux/amd64
    image: shinzo-generator:latest
    restart: unless-stopped 
    build:
      context: .
      dockerfile: Dockerfile
    user: "1001:1001" # shinzo-generator identity
    networks:
      - shinzo-net
    mem_limit: 16g 
    mem_reservation: 13g
    ports: 
      - "9171:9171" #open ports to connect with hosts.
    environment:
      # Ethereum Node Configuration
      - GETH_RPC_URL=${GETH_RPC_URL}
      - GETH_WS_URL=${GETH_WS_URL}
      - GETH_API_KEY=${GETH_API_KEY}
      - GETH_API_KEY_TYPE=${GETH_API_KEY_TYPE} # this is your api key type
      
      # DefraDB Configuration (embedded)
      - DEFRADB_KEYRING_SECRET=${DEFRADB_KEYRING_SECRET:-}
      
      # Indexer Configuration
      - INDEXER_START_HEIGHT=${INDEXER_START_HEIGHT:-0}
      - GOMEMLIMIT=14GiB
      - SNAPSHOT_ENABLED=false
      - LOG_LEVEL=error
      - LOG_SOURCE=false
      - LOG_STACKTRACE=false
    logging:
      options:
        max-size: "50m"
        max-file: "3"
    volumes:
      - ~/shinzo-data/defradb:/app/.defra
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s