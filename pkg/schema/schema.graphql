type Polygon__Mainnet__Block {
    extraData: String
    baseFeePerGas: String
    difficulty: String
    gasLimit: String
    gasUsed: String
    hash: String
    logsBloom: String
    miner: String
    mixHash: String
    nonce: String
    number: Int
    parentHash: String
    transactionsRoot: String
    uncles: [String]
    receiptsRoot: String
    sha3Uncles: String
    size: String
    stateRoot: String
    timestamp: String
    # Relationships
    transactions: [Polygon__Mainnet__Transaction] @relation(name: "block_transactions")
}

# BlockSignature covers all documents in a block (txs, logs, ALEs, and the block itself)
# Created in the same transaction as the block data, arrives via P2P together
type Polygon__Mainnet__BlockSignature {
    blockNumber: Int
    blockHash: String
    merkleRoot: String
    cidCount: Int
    cids: [String]
    signatureType: String
    signatureIdentity: String
    signatureValue: String
    createdAt: String
}

# SnapshotSignature seals a snapshot file with a Merkle root over per-block block
# signature Merkle roots. Used for cross-indexer attestation and snapshot exchange.
type Polygon__Mainnet__SnapshotSignature {
    startBlock: Int
    endBlock: Int
    merkleRoot: String
    blockCount: Int
    signatureType: String
    signatureIdentity: String
    signatureValue: String
    snapshotFile: String
    createdAt: String
    blockSigMerkleRoots: [String]
}


type Polygon__Mainnet__Transaction {
    hash: String
    blockHash: String
    blockNumber: Int
    from: String
    to: String
    value: String
    gas: String
    gasPrice: String
    maxFeePerGas: String
    maxPriorityFeePerGas: String
    input: String
    nonce: String
    transactionIndex: Int
    type: String
    chainId: String
    v: String
    r: String
    s: String
    yParity: String
    # Relationships
    block: Polygon__Mainnet__Block @relation(name: "block_transactions")
    logs: [Polygon__Mainnet__Log] @relation(name: "transaction_logs")
    accessList: [Polygon__Mainnet__AccessListEntry] @relation(name: "transaction_accessList")
}

type Polygon__Mainnet__AccessListEntry {
    address: String
    blockNumber: Int
    storageKeys: [String]
    transaction: Polygon__Mainnet__Transaction @relation(name: "transaction_accessList")
}

type Polygon__Mainnet__Log {
    address: String
    topics: [String]
    data: String
    blockNumber: Int
    transactionHash: String
    transactionIndex: Int
    blockHash: String
    logIndex: Int
    removed: String
    # Relationships
    block: Polygon__Mainnet__Block @relation(name: "block_logs")
    transaction: Polygon__Mainnet__Transaction @relation(name: "transaction_logs")
}
