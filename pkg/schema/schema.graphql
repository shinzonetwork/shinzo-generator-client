type Ethereum__Sepolia__Block {
    hash: String
    number: Int
    timestamp: String
    parentHash: String
    difficulty: String
    totalDifficulty: String
    gasUsed: String
    gasLimit: String
    baseFeePerGas: String
    nonce: String
    miner: String
    size: String
    stateRoot: String
    sha3Uncles: String
    transactionsRoot: String
    receiptsRoot: String
    logsBloom: String
    extraData: String
    mixHash: String
    uncles: [String]
    # Relationships
    transactions: [Ethereum__Sepolia__Transaction] @relation(name: "block_transactions")
}

# BlockSignature covers all documents in a block (txs, logs, ALEs, and the block itself)
# Created in the same transaction as the block data, arrives via P2P together
type Ethereum__Sepolia__BlockSignature {
    blockNumber: Int
    blockHash: String
    merkleRoot: String
    cidCount: Int
    cids: [String]
    signatureType: String
    signatureIdentity: String
    signatureValue: String
    createdAt: String
}

# SnapshotSignature seals a snapshot file with a Merkle root over per-block block
# signature Merkle roots. Used for cross-indexer attestation and snapshot exchange.
type Ethereum__Sepolia__SnapshotSignature {
    startBlock: Int
    endBlock: Int
    merkleRoot: String
    blockCount: Int
    signatureType: String
    signatureIdentity: String
    signatureValue: String
    snapshotFile: String
    createdAt: String
    blockSigMerkleRoots: [String]
}

type Ethereum__Sepolia__Transaction {
    hash: String
    blockHash: String
    blockNumber: Int
    from: String
    to: String
    value: String
    gas: String
    gasPrice: String
    gasUsed: String
    maxFeePerGas: String
    maxPriorityFeePerGas: String
    input: String
    nonce: String
    transactionIndex: Int
    type: String
    chainId: String
    v: String
    r: String
    s: String
    status: Boolean
    cumulativeGasUsed: String
    effectiveGasPrice: String
    # Relationships
    block: Ethereum__Sepolia__Block @relation(name: "block_transactions")
    logs: [Ethereum__Sepolia__Log] @relation(name: "transaction_logs")
    accessList: [Ethereum__Sepolia__AccessListEntry] @relation(name: "transaction_accessList")
}

type Ethereum__Sepolia__AccessListEntry {
    address: String
    blockNumber: Int
    storageKeys: [String]
    transaction: Ethereum__Sepolia__Transaction @relation(name: "transaction_accessList")
}

type Ethereum__Sepolia__Log {
    address: String
    topics: [String]
    data: String
    transactionHash: String
    blockHash: String
    blockNumber: Int
    transactionIndex: Int
    logIndex: Int
    removed: String
    # Relationships
    block: Ethereum__Sepolia__Block @relation(name: "block_logs")
    transaction: Ethereum__Sepolia__Transaction @relation(name: "transaction_logs")
}
