type Arbitrum__Mainnet__Block {
    hash: String
    number: Int
    timestamp: String
    parentHash: String
    difficulty: String
    extraData: String
    gasLimit: String
    gasUsed: String
    hash: String @index(unique: true)
    l1BlockNumber: String
    logsBloom: String
    mixHash: String
    nonce: String
    number: Int @index
    parentHash: String
    receiptsRoot: String
    sendCount: String
    sendRoot: String
    sha3Uncles: String
    size: String
    stateRoot: String
    timestamp: String
    transactions: [Arbitrum__Mainnet__Transaction] @relation(name: "block_transactions")
}

# BlockSignature covers all documents in a block (txs, logs, ALEs, and the block itself)
# Created in the same transaction as the block data, arrives via P2P together
type Arbitrum__Mainnet__BlockSignature {
    blockNumber: Int
    blockHash: String
    merkleRoot: String
    cidCount: Int
    cids: [String]
    signatureType: String
    signatureIdentity: String
    signatureValue: String
    createdAt: String
}

# SnapshotSignature seals a snapshot file with a Merkle root over per-block block
# signature Merkle roots. Used for cross-indexer attestation and snapshot exchange.
type Arbitrum__Mainnet__SnapshotSignature {
    startBlock: Int
    endBlock: Int
    merkleRoot: String
    blockCount: Int
    signatureType: String
    signatureIdentity: String
    signatureValue: String
    snapshotFile: String
    createdAt: String
    blockSigMerkleRoots: [String]
}

type Arbitrum__Mainnet__Transaction {
    hash: String
    blockHash: String
    blockNumber: Int
    from: String
    gas: String
    gasPrice: String
    hash: String @index(unique: true)
    input: String
    nonce: String
    to: String
    transactionIndex: Int @index
    value: String
    type: String
    chainId: String
    v: String
    r: String
    s: String
    # Receipt fields
    contractAddress: String
    cumulativeGasUsed: String
    effectiveGasPrice: String
    gasUsed: String
    gasUsedForL1: String
    l1BlockNumber: String
    status: String
    timeboosted: Boolean
    logsBloom: String
    # Relationships
    block: Arbitrum__Mainnet__Block @relation(name: "block_transactions")
    logs: [Arbitrum__Mainnet__Log] @relation(name: "transaction_logs")
}

type Arbitrum__Mainnet__Log {
    address: String @index
    topics: [String]
    data: String
    blockNumber: Int @index
    transactionHash: String @index
    transactionIndex: Int @index
    blockHash: String @index
    logIndex: Int @index
    removed: Boolean
    # Relationships
    block: Arbitrum__Mainnet__Block @relation(name: "block_logs")
    transaction: Arbitrum__Mainnet__Transaction @relation(name: "transaction_logs")
}
