type Optimism__Mainnet__Block {
    baseFeePerGas: String
    blobGasUsed: String
    difficulty: String
    excessBlobGas: String
    extraData: String
    gasLimit: String
    gasUsed: String
    hash: String @index(unique: true)
    l1BlockNumber: String
    logsBloom: String
    miner: String
    mixHash: String
    nonce: String
    number: Int @index
    parentBeaconBlockRoot: String
    parentHash: String
    receiptsRoot: String
    requestsHash: String
    sha3Uncles: String
    size: String
    stateRoot: String
    timestamp: String
    transactionsRoot: String
    transactions: [Optimism__Mainnet__Transaction] @relation(name: "block_transactions")
    withdrawalsRoot: String
}

type Optimism__Mainnet__Transaction {
    # Transaction fields
    blockHash: String @index
    blockNumber: Int @index
    from: String
    gas: String
    gasPrice: String
    hash: String @index(unique: true)
    input: String
    nonce: String
    to: String
    transactionIndex: Int @index
    value: String
    type: String
    chainId: String
    v: String
    r: String
    s: String
    # Receipt fields
    contractAddress: String
    cumulativeGasUsed: String
    effectiveGasPrice: String
    gasUsed: String
    gasUsedForL1: String
    l1BlockNumber: String
    status: String
    timeboosted: Boolean
    logsBloom: String
    # Relationships
    block: Optimism__Mainnet__Block @index @relation(name: "block_transactions")
    logs: [Optimism__Mainnet__Log] @relation(name: "transaction_logs")
}

type Optimism__Mainnet__Log {
    address: String @index
    topics: [String]
    data: String
    blockNumber: Int @index
    transactionHash: String @index
    transactionIndex: Int @index
    blockHash: String @index
    logIndex: Int @index
    removed: Boolean
    # Relationships
    transaction: Optimism__Mainnet__Transaction @index @relation(name: "transaction_logs")
}