type Avalanche__Mainnet__Block {
    baseFeePerGas: String
    difficulty: String
    extraData: String
    gasLimit: String
    gasUsed: String
    hash: String @index(unique: true)
    logsBloom: String
    mixHash: String
    nonce: String
    number: Int @index
    parentHash: String
    receiptsRoot: String
    sha3Uncles: String
    size: String
    stateRoot: String
    timestamp: String
    # Avalanche-specific fields
    blockExtraData: String
    blockGasCost: String
    extDataGasUsed: String
    extDataHash: String
    transactions: [Avalanche__Mainnet__Transaction] @relation(name: "block_transactions")
}

type Avalanche__Mainnet__Transaction {
    # Transaction fields
    blockHash: String @index
    blockNumber: Int @index
    from: String
    gas: String
    gasPrice: String
    hash: String @index(unique: true)
    input: String
    nonce: String
    to: String
    transactionIndex: Int @index
    value: String
    type: String
    chainId: String
    v: String
    r: String
    s: String
    # Receipt fields
    contractAddress: String
    cumulativeGasUsed: String
    effectiveGasPrice: String
    gasUsed: String
    status: String
    logsBloom: String
    # Relationships
    block: Avalanche__Mainnet__Block @index @relation(name: "block_transactions")
    logs: [Avalanche__Mainnet__Log] @relation(name: "transaction_logs")
}

type Avalanche__Mainnet__Log {
    address: String @index
    topics: [String]
    data: String
    blockNumber: Int @index
    transactionHash: String @index
    transactionIndex: Int @index
    blockHash: String @index
    logIndex: Int @index
    removed: Boolean
    # Relationships
    transaction: Avalanche__Mainnet__Transaction @index @relation(name: "transaction_logs")
}