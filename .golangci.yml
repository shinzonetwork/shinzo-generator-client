# golangci-lint configuration (v2)
# Run: golangci-lint run
# Docs: https://golangci-lint.run/usage/configuration/

version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/shinzonetwork/shinzo-indexer-client

linters:
  # Default linters (errcheck, govet, ineffassign, staticcheck, unused) are enabled automatically
  enable:
    - misspell      # Check for misspelled words
    - unconvert     # Remove unnecessary type conversions
    - unparam       # Report unused function parameters
    - gocritic      # Opinionated linter with many checks
    - revive        # Fast, configurable linter (golint replacement)
    - nilerr        # Check for returning nil after checking error
    - errorlint     # Find issues with error wrapping

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment  # Too strict for most cases
    
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
          disabled: true  # Not all packages need comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
    
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam        # Too strict for structs
        - rangeValCopy     # Sometimes intentional
        - commentedOutCode # We have some TODOs with code examples

    misspell:
      locale: US

  exclusions:
    rules:
      # Exclude some linters from running on tests
      - path: _test\.go
        linters:
          - errcheck
          - gocritic
          - unparam
      
      # Exclude some linters from generated files
      - path: ".*_gen\\.go"
        linters:
          - all
    
    # Maximum issues count per one linter (0 = unlimited)
    max-issues-per-linter: 50
    
    # Maximum count of issues with the same text (0 = unlimited)
    max-same-issues: 3

output:
  formats:
    colored-line-number:
      path-prefix: ""
  print-issued-lines: true
  print-linter-name: true
  sort-results: true
