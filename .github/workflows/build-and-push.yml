name: Build and Push

on:
  workflow_run:
    workflows: ["Go Test CI"]
    types: [completed]
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: build-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: shinzonetwork/shinzo-indexer-client

jobs:
  # Job 1: Build and push standard image (standard)
  build-and-push-standard:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: short_sha
        run: echo "sha=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push standard image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.short_sha.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:standard
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 2: Build summary
  build-summary:
    needs: [build-and-push-standard]
    runs-on: ubuntu-latest
    steps:
      - name: Build summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Standard | ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:standard" >> $GITHUB_STEP_SUMMARY
