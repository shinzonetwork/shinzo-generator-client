name: Trigger Standard Build

on:
  workflow_run:
    workflows: ["Go Test CI"]
    types: [completed]
    branches: [develop]
  workflow_dispatch:

jobs:
  call:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    uses: shinzonetwork/shinzo-indexer-client/.github/workflows/build-and-push.yml@main
    with:
      chain: standard
      branch: develop
    secrets: inherit