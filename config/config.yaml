# Default configuration - environment variables will override these
defradb:
  url: ""  # Empty = embedded DefraDB
  keyring_secret: "" # over written by env var
  embedded: true
  p2p:
    enabled: true
    bootstrap_peers: []
    listen_addr: "/ip4/0.0.0.0/tcp/9171"
    max_retries: 5                  # Number of connection attempts before marking peer as failed
    retry_base_delay_ms: 1000       # Base delay for exponential backoff (1s, 2s, 4s, 8s, 16s)
    reconnect_interval_ms: 60000    # Check for disconnected peers every 60 seconds
    enable_auto_reconnect: true     # Automatically reconnect to failed/disconnected peers
  store:
    path: "./.defra"

geth:
  node_url: "${GETH_RPC_URL}"  # Fallback
  ws_url: "${GETH_WS_URL}"
  api_key: "${GETH_API_KEY}"

indexer:
  start_height: 23700000
  doc_push_rate_limit: 0  # Max docs per second to push (0 = no limit)
  docs_per_txn: 25         # Documents per DefraDB transaction commit (default: 25)
  concurrent_blocks: 4     # Number of blocks to process concurrently (default: 1 = sequential)
  prefetch_blocks: 8       # Number of blocks to prefetch ahead (default: 2)
  receipt_workers: 30      # Concurrent receipt fetchers per block (default: 20)

logger:
  development: false

migration:
  enabled: true                     # Enable migration
  start_block: 0                    # First block to migrate
  end_block: 20000000               # Last block (or 0 to use indexer.start_height - 1)
  batch_size: 1000                  # Blocks per batch
  workers: 4                        # Parallel workers
  output_dir: "./snapshot_data"     # Cache directory
  provider: "aws"                   # Data provider
  validate: false                   # Enable validation
  validate_sample: 100              # Blocks to validate

