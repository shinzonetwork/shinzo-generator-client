# Default configuration - environment variables will override these
defradb:
  url: "http://localhost:9181"  # Empty = embedded DefraDB
  keyring_secret: "" # over written by env var
  embedded: true
  p2p:
    enabled: true
    bootstrap_peers: []
    listen_addr: "/ip4/0.0.0.0/tcp/9171"
    max_retries: 5                  # Number of connection attempts before marking peer as failed
    retry_base_delay_ms: 1000       # Base delay for exponential backoff (1s, 2s, 4s, 8s, 16s)
    reconnect_interval_ms: 60000    # Check for disconnected peers every 60 seconds
    enable_auto_reconnect: true     # Automatically reconnect to failed/disconnected peers
  store:
    path: "./.defra"
    # Badger memory configuration
    block_cache_mb: 1024  # Block cache size
    memtable_mb: 128      # Memtable size
    index_cache_mb: 512   # Index cache size
    # Badger compaction configuration
    num_compactors: 4              # Number of compaction workers
    # num_level_zero_tables: 10      # L0 tables before compaction starts
    # num_level_zero_tables_stall: 30  # L0 tables that trigger write stalls

geth:
  node_url: "${GETH_RPC_URL}"  # Fallback
  ws_url: "${GETH_WS_URL}"
  api_key: "${GETH_API_KEY}"

indexer:
  start_height: 23700000
  concurrent_blocks: 2      # Number of blocks to process concurrently
  receipt_workers: 8        # Concurrent receipt fetchers per block
  max_docs_per_txn: 1000    # Docs threshold for single-txn block creation
  blocks_per_minute: 65     # Block indexing rate limit
  health_server_port: 8080  # Health server port (-1 == disabled)
  pprof_port: 6060          # Pprof server port (-1 == disabled)
  open_browser_on_start: false  # Auto-open health page on startup

logger:
  development: false
  level: "error"
