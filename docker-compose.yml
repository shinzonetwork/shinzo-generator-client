networks:
  shinzo-net:
    driver: bridge

services:
  generator:
    container_name: shinzo-generator
    platform: linux/amd64
    image: ghcr.io/shinzonetwork/shinzo-generator-client:standard
    user: "1001:1001" # shinzo-generator identity
    restart: unless-stopped
    networks:
      - shinzo-net
    mem_limit: 16g
    mem_reservation: 13g
    ports:
      - "9171:9171"
    environment:
      # Ethereum Node Configuration
      - GETH_RPC_URL=${GETH_RPC_URL}
      - GETH_WS_URL=${GETH_WS_URL}
      - GETH_API_KEY=${GETH_API_KEY}
      - GETH_API_KEY_TYPE=${GETH_API_KEY_TYPE}

      # DefraDB Configuration (embedded)
      - DEFRADB_KEYRING_SECRET=${DEFRADB_KEYRING_SECRET:-}
      
      # Generator Configuration
      - INDEXER_START_HEIGHT=${INDEXER_START_HEIGHT:-0}
      - GOMEMLIMIT=14GiB
      - SNAPSHOT_ENABLED=false
      - LOG_LEVEL=error
      - LOG_SOURCE=false
      - LOG_STACKTRACE=false
      - SCHEMA_AUTH_MODE=none
    logging:
      options:
        max-size: "50m"
        max-file: "3"
    volumes:
      - ~/shinzo-data/defradb:/app/.defra
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - generator
    networks:
      - shinzo-net
    restart: unless-stopped
